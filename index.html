<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise AI Inventory System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Modern CSS Variables for Design Consistency */
        :root {
            --bg-main: #0b0f19;
            --bg-card: #111827;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-glow: #6366f1;
            --accent-hover: #4f46e5;
            --border-color: #1f2937;
            --success: #10b981;
        }

        * { box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; margin: 0; padding: 0; }
        
        body { 
            display: flex; 
            width: 100vw; 
            height: 100vh; 
            background-color: var(--bg-main); 
            color: var(--text-primary); 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
        }
        
        /* Left Panel Structure */
        #dashboard { 
            width: 55vw; 
            height: 100vh; 
            padding: 40px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
        }
        
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border-color); 
            padding-bottom: 20px; 
        }
        
        h1 { 
            font-size: 26px; 
            font-weight: 700; 
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .refresh-btn { 
            background: linear-gradient(135deg, var(--accent-glow), #4338ca); 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 14px;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
            transition: all 0.2s ease; 
        }
        
        .refresh-btn:hover { 
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
        }
        
        /* Modern Card/Table Containment */
        .table-container { 
            background-color: var(--bg-card); 
            border: 1px solid var(--border-color);
            border-radius: 12px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); 
            overflow: hidden; 
            width: 100%; 
        }
        
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 18px 24px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        
        th { 
            background-color: #1f2937; 
            font-weight: 600; 
            color: var(--text-secondary); 
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.05em;
        }
        
        tr { transition: background-color 0.15s ease; }
        tr:hover { background-color: #1f2937; }
        
        /* Micro-Styling for Data Elements */
        .id-badge {
            background-color: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            padding: 4px 8px;
            border-radius: 6px;
            font-family: monospace;
            font-weight: bold;
        }
        
        .qty-text { color: var(--success); font-weight: 600; }
        .price-text { color: #f59e0b; font-weight: 600; }
        .timestamp-text { color: var(--text-secondary); font-size: 13px; }

        /* Right Panel Structure */
        #chat-section { 
            width: 45vw; 
            height: 100vh; 
            background: var(--bg-card); 
            border-left: 1px solid var(--border-color); 
            position: relative; 
        }
    </style>
</head>
<body>

    <div id="dashboard">
        <header>
            <h1>⚡ Intelligence Hub</h1>
            <button class="refresh-btn" onclick="fetchInventory()">🔄 Synchronize Engine</button>
        </header>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Asset Index</th>
                        <th>Item Label</th>
                        <th>Quantity Allocation</th>
                        <th>Unit Value</th>
                        <th>System Updated</th>
                    </tr>
                </thead>
                <tbody id="inventory-data">
                    <tr>
                        <td colspan="5" style="text-align: center; color: var(--text-secondary); padding: 40px;">
                            Initializing high-speed data stream pipelines...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="chat-section"></div>

    <script>
        const SUPABASE_URL = "https://uyrfgdjwsthmwyhvdrj.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_1EmUVN4ONUX-2dnEY-eFZg_GzYA06mw";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function fetchInventory() {
            const tbody = document.getElementById('inventory-data');
            
            try {
                let { data: Items, error } = await supabaseClient.from('Items').select('*');
                
                if (error) throw error;
                
                tbody.innerHTML = ''; 
                
                if (!Items || Items.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding: 40px; color: var(--text-secondary);">System registers empty allocation arrays. Instruct Agent on right to seed entry records.</td></tr>`;
                    return;
                }

                Items.forEach(item => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><span class="id-badge">ID-${item.id}</span></td>
                        <td style="font-weight: 500;">${item.name || 'Null Value'}</td>
                        <td><span class="qty-text">${item.quantity !== null && item.quantity !== undefined ? item.quantity : '-'}</span></td>
                        <td><span class="price-text">${item.price ? '$' + parseFloat(item.price).toFixed(2) : '-'}</span></td>
                        <td><span class="timestamp-text">${new Date(item.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} | ${new Date(item.created_at).toLocaleDateString()}</span></td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) {
                console.error("Database Core Error Encountered:", err);
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding: 40px; color: #ef4444; font-weight: 500;">❌ API Authentication Breach or Column Schema Conflict.</td></tr>`;
            }
        }

        window.onload = fetchInventory;
    </script>

    <script type="module">
        import Chatbox from 'https://cdn.jsdelivr.net/npm/flowise-embed/dist/web.js'
        Chatbox.initFull({
            chatflowid: "799da5c9-7df4-4bff-bce9-5cb6915e47e5", 
            apiHost: "https://cloud.flowiseai.com",  
            theme: {
                chatWindow: {
                    welcomeMessage: "Welcome to the Dark-Variant System Terminal. Provide standard natural language operations to write directly to your global Supabase cloud instance.",
                    backgroundColor: "#111827", /* Matches dashboard cards exactly */
                    fontSize: 16,
                    userMessage: {
                        backgroundColor: "#6366f1",
                        textColor: "#ffffff"
                    },
                    agentMessage: {
                        backgroundColor: "#1f2937",
                        textColor: "#f3f4f6"
                    }
                }
            }
        })
    </script>

</body>
</html>
